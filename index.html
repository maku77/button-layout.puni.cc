<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Layout Editor</title>
  </head>
  <body>
    <div id="app">
      <h1>Button Layout Editor</h1>
      <div id="toolbar">
        <label>
          Controller:
          <select id="controller-select"></select>
        </label>
        <label>
          Game:
          <select id="game-select"></select>
        </label>
        <button id="btn-save">Save as PNG</button>
      </div>
      <div id="editor-container">
        <canvas id="layout-canvas"></canvas>
        <div id="action-panel">
          <h3>Assign Action</h3>
          <div id="action-buttons"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
